name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (type check + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Create test database
        working-directory: backend
        run: npx prisma db push
        env:
          DATABASE_URL: file:./test.db

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-for-ci-pipeline-32chars
          JWT_EXPIRES_IN: 7d
          JWT_REFRESH_EXPIRES_IN: 30d
          BCRYPT_SALT_ROUNDS: "4"
          CORS_ORIGIN: http://localhost:5173
          PORT: "3001"
          DEFAULT_ESCROW_HOLD_DAYS: "7"
          PLATFORM_FEE_PERCENTAGE: "10"
          MP_SANDBOX: "true"

      - name: Run security tests
        working-directory: backend
        run: npx vitest run tests/security/
        env:
          NODE_ENV: test
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-for-ci-pipeline-32chars
          JWT_EXPIRES_IN: 7d
          JWT_REFRESH_EXPIRES_IN: 30d
          BCRYPT_SALT_ROUNDS: "4"
          CORS_ORIGIN: http://localhost:5173
          PORT: "3001"
          DEFAULT_ESCROW_HOLD_DAYS: "7"
          PLATFORM_FEE_PERCENTAGE: "10"
          MP_SANDBOX: "true"

  frontend:
    name: Frontend (lint + type check + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

  security-audit:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Backend dependency audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Detect secrets in codebase
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
